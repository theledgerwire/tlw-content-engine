name: TLW Image Generator

on:
  workflow_dispatch:
    inputs:
      story_title:
        description: 'Story title from RSS'
        required: false
        default: ''
      story_summary:
        description: 'Story summary from RSS'
        required: false
        default: ''
      image_keyword:
        description: 'Image search keyword'
        required: false
        default: 'finance technology'
      card_type:
        description: 'Card type: news | weekly_tuesday | weekly_friday'
        required: false
        default: 'news'
      weekly_headlines:
        description: 'Pipe-separated headlines for weekly recap cards'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pillow requests

      - name: Install fonts
        run: sudo apt-get install -y fonts-liberation

      - name: Generate and post card
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_PROFILE_X: ${{ secrets.BUFFER_PROFILE_X }}
          BUFFER_PROFILE_LI: ${{ secrets.BUFFER_PROFILE_LI }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STORY_TITLE: ${{ github.event.inputs.story_title }}
          STORY_SUMMARY: ${{ github.event.inputs.story_summary }}
          IMAGE_KEYWORD: ${{ github.event.inputs.image_keyword }}
          CARD_TYPE: ${{ github.event.inputs.card_type }}
          WEEKLY_HEADLINES: ${{ github.event.inputs.weekly_headlines }}
        run: python generate_image.py

      - name: Upload card as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: card-output
          path: card.png
          retention-days: 3
