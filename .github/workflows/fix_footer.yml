name: Fix Footer
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: python fix_footer.py
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add generate_image.py
          git commit -m "v18.1: restore branded footer"
          git push
          git rm fix_footer.py
          git commit -m "cleanup fix script"
          git push
